<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@vulos/relay-client — built-library consumer harness</title>
  </head>
  <body>
    <!--
      @vulos/relay-client is a LIBRARY, not an app: there is no UI to "boot", so
      a boot guard in the usual sense is meaningless here. The equivalent floor —
      and the one that would have caught the blank screens that shipped elsewhere
      in this suite — is:

        can a CONSUMER import the BUILT entry points in a real browser and use
        them, without anything throwing?

      That is what this page is. It imports every published subpath as a BARE
      specifier (through the package `exports` map, i.e. exactly what Office,
      Meet and Talk get from npm), evaluates them, constructs the real classes,
      and mounts the React hook the package exports. See main.jsx.
    -->
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>

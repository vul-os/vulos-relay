# ─────────────────────────────────────────────────────────────────────────────
# envoir-gateway — PERSONAL (single-operator) config
#
#   Run: envoir-gateway personal /path/to/personal.toml
#
# This is the "just a gateway for my own email" configuration: one person bridging
# THEIR OWN domain between legacy SMTP and DMTAP. No mesh, cloud, or billing needed.
#
# Format: flat `key = value`. `#` starts a comment. Values may be double-quoted.
# Every key is OPTIONAL and has a safe default — an unset key is never an open relay.
# Unknown keys and malformed values are HARD startup errors (fail-closed).
# ─────────────────────────────────────────────────────────────────────────────

# The domain this gateway is the MX for, and signs attestations / DKIM as. YOUR domain.
domain = "example.org"

# MX listen address.
#   Production: "0.0.0.0:25"  — needs a real public IP and inbound port 25 open.
#   Local test: "127.0.0.1:2525" (default is 0.0.0.0:2525).
listen = "0.0.0.0:25"

# The DKIM / gateway-attestation selector published under your domain (see README DNS).
selector = "gw1"

# Recursive DNS resolver (ip:port) used for outbound MX/MTA-STS and inbound
# DKIM/SPF/DMARC TXT lookups.
dns_server = "1.1.1.1:53"

# Recipient directory: YOUR OWN identities, one per line, whitespace-separated:
#     <email>  <ed25519-identity-key-b64>  <x25519-seal-key-b64>
# These come from your envoir node/client (its published keys). Copy the example:
#     gateway/examples/recipients.directory
# Unset ⇒ empty directory: every inbound RCPT gets 550 (resolves nobody — safe default).
directory = "recipients.directory"

# Your envoir node's ingest URL. The converted, recipient-sealed MOTE is POSTed here;
# a 2xx is the durable-custody ack that lets the gateway answer SMTP 250. Unset ⇒
# NullMesh: inbound always 451 (the legacy sender retries) — honest, never a silent drop.
mesh_endpoint = "http://127.0.0.1:8710/dmtap/ingest"

# STARTTLS (all-or-nothing): PEM certificate chain + private key for your MX hostname.
# Leave both unset for a plaintext dev listener. Get real certs from e.g. Let's Encrypt.
# tls_cert = "/etc/letsencrypt/live/example.org/fullchain.pem"
# tls_key  = "/etc/letsencrypt/live/example.org/privkey.pem"

# Outbound-relay admission mode:
#   "key-registered" (default) — only your own directory identities may relay outbound.
#   "open-public"              — anyone may relay. A SPAM MAGNET. Never on the public
#                                internet; only on a trusted, firewalled segment.
authz_mode = "key-registered"

# Inbound legacy-auth enforcement. Default false = "annotate only" (evaluate but never
# bounce), so a fresh gateway does not reject legitimate mail on a check you haven't
# deliberately turned on. Flip to true once you trust each check for your traffic.
dkim_enforce  = false   # reject present-but-invalid DKIM signatures
spf_enforce   = false   # reject SPF hard-fails at MAIL FROM
dmarc_enforce = false   # reject unaligned p=reject / sp=reject

# Optional per-identity hard caps (0 = unlimited). A personal gateway enforces a ceiling;
# it does not price overage. Handy to bound blast radius if a key is compromised.
quota_messages = 0
quota_bytes    = 0

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL legacy IMAP access server (spec §8.2) — OFF by default.
#
# Lets old mail clients (Thunderbird, Apple Mail, Outlook, mutt) read/manage your
# DMTAP mailbox over IMAP, alongside the SMTP bridge above. It is STORE-BACKED: the
# gateway is otherwise stateless, so the served mailbox is YOUR OWN snapshot — a
# directory of RFC 5322 .eml files handed to the gateway (imap_maildir). Mutations
# (flag changes, APPEND) are session-local and NOT persisted back; your node stays
# the mailbox authority. Requires tls_cert/tls_key above — app-passwords must never
# travel in cleartext.
# ─────────────────────────────────────────────────────────────────────────────

# imap_enable = true

# Bind address. Production: "0.0.0.0:993" (implicit TLS) or "0.0.0.0:143" (STARTTLS).
# imap_listen = "127.0.0.1:1143"

# TLS mode: "starttls" (default, upgrade in place) or "implicit" (TLS from byte one).
# imap_tls = "starttls"

# App-password credentials, one per line:
#     <username>  <app-password>  [<ed25519-identity-key-b64>]
# The identity key may be omitted when <username> matches an email in `directory`
# above (it is then resolved from there). Unset ⇒ no credentials ⇒ every login is
# refused (fail-closed).
# imap_credentials = "app-passwords.txt"

# Optional directory of RFC 5322 `.eml` files projected into the served INBOX — the
# operator's own mailbox snapshot. Shared by the IMAP and POP3 surfaces (same maildrop).
# Unset ⇒ the standard empty folder layout.
# imap_maildir = "/var/mail/owner"

# ─────────────────────────────────────────────────────────────────────────────
# OPERATOR MODE for legacy client access (spec §7.15.4) — governs WHICH accounts
# the legacy surfaces (IMAP/POP3/submission) will serve, and carries the honest-
# privacy disclosure (§7.15.3): a NON-private gateway DECRYPTS and can read the
# mail it serves — that is a deliberate trust decision, not zero-access.
#
#   "private" (default)        single operator — you, on your OWN gateway. Zero
#                              third party reads the mail. At most ONE account.
#   "registered-clients-only"  only your registered `directory` identities.
#   "public"                   open registration — any provisioned account (the
#                              operator can read every served user's mail).
# ─────────────────────────────────────────────────────────────────────────────

# gateway_mode = "private"

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL legacy POP3 access server (spec §7.15.1, RFC 1939) — OFF by default.
# Download-and-delete maildrop for old clients. Reuses imap_credentials (app-
# passwords) and imap_maildir (the served maildrop). Requires tls_cert/tls_key.
# Deletions are session-local (not persisted back; your node is the authority).
# ─────────────────────────────────────────────────────────────────────────────

# pop3_enable = true
# Production: "0.0.0.0:995" (implicit TLS) or "0.0.0.0:110" (STLS).
# pop3_listen = "127.0.0.1:1110"
# TLS mode: "starttls" (default, STLS) or "implicit".
# pop3_tls = "starttls"

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL legacy SMTP-submission access server (spec §7.15.1, RFC 6409) — OFF by
# default. Lets old clients SEND. Requires tls_cert/tls_key (the app-password must
# not travel in cleartext; AUTH is refused on a cleartext channel). Each accepted
# message is converted to a MOTE and written to submission_spool for YOUR NODE to
# pick up (native recipients → mesh; legacy recipients → the §7.3 SMTP relay).
# ─────────────────────────────────────────────────────────────────────────────

# submission_enable = true
# Production: "0.0.0.0:465" (implicit TLS) or "0.0.0.0:587" (STARTTLS).
# submission_listen = "127.0.0.1:1587"
# TLS mode: "starttls" (default) or "implicit".
# submission_tls = "starttls"
# Hand-off directory your node picks up accepted outbound messages from (REQUIRED
# when submission_enable = true — must already exist; the gateway keeps no queue).
# submission_spool = "/var/spool/envoir-out"
# Recipient domains treated as NATIVE (→ MOTE / mesh) vs legacy (→ §7.3 bridge).
# Whitespace/comma-separated. Unset ⇒ defaults to `domain` above.
# submission_native_domains = "example.org"

# NOTE: CalDAV (RFC 4791) / CardDAV (RFC 6352) are NOT served — dmtap-mail has no
# DAV server yet, so calendar/contact client access is a documented follow-up gap
# (not faked). See README "Gaps".

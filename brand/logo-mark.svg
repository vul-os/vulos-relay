<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wakala">
  <title>Wakala</title>
  <desc>A "W" built from five routing nodes joined by straight relay lines; the center node — the broker — carries a teal halo ring where the two routed paths meet and change hands.</desc>
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC24B"/>
      <stop offset=".55" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#E8543D"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="240" height="240" rx="52" fill="url(#wg)"/>
  <g fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <path d="M58 76 L91 166 L120 116 L149 166 L182 76"/>
  </g>
  <!-- broker halo: the routed paths change hands at the center node -->
  <circle cx="120" cy="116" r="23" fill="none" stroke="#14B8A6" stroke-width="5" opacity=".95"/>
  <g fill="#ffffff">
    <circle cx="58" cy="76" r="10"/>
    <circle cx="91" cy="166" r="8"/>
    <circle cx="120" cy="116" r="13"/>
    <circle cx="149" cy="166" r="8"/>
    <circle cx="182" cy="76" r="10"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="14 5 72 92" width="288" height="368" role="img" aria-label="Ephor">
  <title>Ephor</title>
  <!-- The Ephor mark: a comma whose notch opens it into a lowercase "e".
       Filled with currentColor so ONE file serves every surface and both
       themes — set `color` on the parent. A hardcoded fill cannot work here:
       white vanishes on the warm-paper light canvas, near-black vanishes on
       the #0c0c0c dark canvas. -->
  <defs>
    <mask id="ephor-cut">
      <rect x="-40" y="-40" width="200" height="200" fill="#fff"/>
      <rect x="31.5" y="29" width="32" height="14" rx="3" fill="#000"
            transform="translate(16 5) rotate(200 47.5 36)"/>
    </mask>
  </defs>
  <g mask="url(#ephor-cut)" fill="currentColor">
    <g transform="rotate(350 50 50) translate(100 0) scale(-1 1)">
      <path d="M 50,10 C 68,10 80,23 80,41 C 80,64 64,82 46,90 C 40,93 35,85 40,81
               C 51,73 57,65 60,56 C 55,61 48,63 41,62 C 28,60 20,51 20,39
               C 20,23 32,10 50,10 Z"/>
    </g>
  </g>
</svg>

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  client:
    name: Client — Build & Test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # The unit suite imports from client/src and runs in jsdom, so it cannot
      # see a broken BUILD OUTPUT. This package is a library: Office, Meet and
      # Talk import the BUILT dist-lib/ — a built entry that throws on load takes
      # THEIR app blank while everything here stays green. Boot a real consumer
      # harness (which imports @vulos/relay-client through the exports map) in
      # chromium.
      - name: Install chromium
        run: npx playwright install --with-deps chromium

      # `test:e2e` → pretest:e2e → build (lib + types) + build:harness
      - name: Built-library boot guard (real browser)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: relay-client-playwright-report
          path: client/playwright-report/
          retention-days: 7

  go:
    name: Relay Server — Build, Vet & Test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test ./... -race

  security:
    name: Security Scan
    runs-on: ubuntu-24.04
    needs: [client, go]
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table
        continue-on-error: true

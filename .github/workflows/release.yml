name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Releases + upload assets
  id-token: write   # npm --provenance (OIDC)
  packages: write   # push the vulos-relayd image to GHCR

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # Verify the tag version matches package.json. Example: tag v1.2.3 must
      # match "version": "1.2.3" so we never publish a mismatched package.
      - name: Check tag/package version match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi

      # Archive dist-lib/ so the GitHub Release step can attach it.
      # Output path ../relay-client-*.tar.gz lands at the repo root (one level
      # above the client/ default working-directory) where upload-artifact picks
      # it up by its bare filename (upload-artifact paths are relative to
      # $GITHUB_WORKSPACE, i.e. the repo root).
      - name: Archive dist-lib
        run: |
          tar -czf ../relay-client-${{ github.ref_name }}-dist.tar.gz dist-lib/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-lib
          path: relay-client-${{ github.ref_name }}-dist.tar.gz
          retention-days: 1

  check-npm-token:
    name: Check NPM_TOKEN availability
    needs: build-and-test
    runs-on: ubuntu-24.04
    outputs:
      has_token: ${{ steps.probe.outputs.has_token }}
    steps:
      # Secrets cannot be read in `if:` expressions directly — map to an output
      # first, then condition the publish job on that output.
      - name: Probe for NPM_TOKEN
        id: probe
        run: |
          if [ -n "$NPM_TOKEN_VAL" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NPM_TOKEN_VAL: ${{ secrets.NPM_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: check-npm-token
    runs-on: ubuntu-24.04
    # Gate on the output produced by check-npm-token, not on the secret
    # expression directly (secret expressions always evaluate to empty in
    # `if:` conditions, so `secrets.NPM_TOKEN != ''` never works).
    if: needs.check-npm-token.outputs.has_token == 'true'
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        # --provenance attaches an OIDC-signed build provenance attestation to
        # the published package. Requires id-token: write at the workflow level.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-image:
    name: Publish vulos-relayd image (GHCR)
    needs: build-and-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The relay Dockerfile is self-contained (pure-Go, no sibling repos), so
      # the repo root is a coherent build context — build straight from it.
      - name: Build & push vulos-relayd
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          # Tag both the version and :latest so fly.toml's :latest reference and
          # pinned deploys both resolve.
          tags: |
            ghcr.io/vul-os/vulos-relayd:${{ github.ref_name }}
            ghcr.io/vul-os/vulos-relayd:latest

  github-release:
    name: Create GitHub Release
    needs: build-and-test
    runs-on: ubuntu-24.04
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-lib

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # draft: leave as published so dependents can resolve it immediately.
          generate_release_notes: true
          files: |
            relay-client-${{ github.ref_name }}-dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
